<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Deck Builder — Search Overhaul v3b</title>
<style>
:root{--bg:#0a0a0a;--bgs:#111;--bgsf:#171717;--bgh:#1f1f1f;--bgi:#0a0a0a;--bd:#262626;--bdl:#333;--t1:#e5e5e5;--t2:#a3a3a3;--t3:#737373;--t4:#525252;--blue:#3b82f6;--blued:#1e3a5f;--amber:#f59e0b;--green:#22c55e;--red:#ef4444;--sw:260px;--rw:48px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;font-size:13px}
button{font-family:inherit;cursor:pointer}input{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bgs);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;z-index:20;transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{width:var(--rw);min-width:var(--rw)}
.sidebar.collapsed .sb-body{display:none}
.sidebar.collapsed .tab-bar{flex-direction:column;height:auto;border-bottom:none}
.sidebar.collapsed .tab-btn{height:44px;border-bottom:none;border-right:2px solid transparent;padding:0}
.sidebar.collapsed .tab-btn.active{border-right-color:var(--blue);border-bottom-color:transparent}
.sidebar.collapsed .tab-btn .tl{display:none}
.sidebar.collapsed .col-btn{height:44px;border-bottom:none}
.sidebar.collapsed .col-btn svg{transform:rotate(180deg)}
.tab-bar{display:flex;border-bottom:1px solid var(--bd);height:38px;min-height:38px;flex-shrink:0}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:500;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--t2)}.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn svg{width:14px;height:14px;flex-shrink:0}
.col-btn{width:32px;min-width:32px;display:flex;align-items:center;justify-content:center;color:var(--t4);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s}
.col-btn:hover{color:var(--t2)}.col-btn svg{width:14px;height:14px;transition:transform .3s}
.sb-body{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* SIDEBAR SEARCH */
.sb-search{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-sec{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.sb-lbl{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--bgsf);border:1px solid var(--bd);border-radius:6px;font-size:10px;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--t4);color:var(--t1)}.chip.active{background:var(--blued);border-color:#2563eb55;color:var(--blue)}
.filters{flex:1;overflow-y:auto;padding:0 12px 12px}
.fg{margin-bottom:12px}.fg-lbl{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fg-row{display:flex;align-items:center;gap:6px}
.fg-range{flex:1;height:4px;background:var(--bd);border-radius:2px;position:relative;cursor:pointer}
.fg-fill{position:absolute;left:0;height:100%;background:var(--blue);border-radius:2px;transition:width .15s}
.fg-in{width:52px;padding:4px 6px;background:var(--bgi);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:11px;text-align:center;outline:none;transition:border-color .15s}
.fg-in:focus{border-color:var(--t4)}
.fc{display:flex;gap:4px;flex-wrap:wrap}
.fc-btn{font-size:10px;padding:3px 7px;background:var(--bgsf);border:1px solid var(--bd);border-radius:4px;color:var(--t2);cursor:pointer;transition:all .15s}
.fc-btn:hover{border-color:var(--t4);color:var(--t1)}.fc-btn.on{background:var(--blued);border-color:#2563eb55;color:var(--blue)}

/* SIDEBAR DECKS */
.sb-decks{flex:1;overflow-y:auto;padding:8px}
.dr{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .1s}
.dr:hover{background:var(--bgh)}.dr.act{background:var(--bgsf)}
.dr .di{flex:1;min-width:0}.dr .dn{font-size:12px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dr .dm{font-size:10px;color:var(--t3)}.dr .dc{font-size:10px;color:var(--t4);background:var(--bg);padding:2px 6px;border-radius:4px}

/* WORKSPACE */
.ws{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{background:var(--bgs);border-bottom:1px solid var(--bd);flex-shrink:0}
.tb-row{display:flex;align-items:center;padding:0 14px;gap:8px}
.tb-r1{min-height:38px;padding-top:4px}.tb-r2{min-height:34px;padding-bottom:4px}
.tright{margin-left:auto;display:flex;align-items:center;gap:6px}
.tb-sel{padding:3px 6px;background:var(--bgi);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:11px;outline:none}
.tb-div{width:1px;height:18px;background:var(--bd)}
.tb-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 7px;background:none;border:1px solid var(--bd);border-radius:5px;color:var(--t3);font-size:11px;transition:all .15s}
.tb-btn:hover{color:var(--t1);border-color:var(--t4)}.tb-btn.active{color:var(--blue);border-color:var(--blued);background:var(--blued)}
.tb-btn svg{width:14px;height:14px}
.tb-stat{font-size:11px;color:var(--t3)}.tb-stat b{color:var(--t2);font-weight:500}

/* SEARCH BAR */
.search-bar{flex:1;display:flex;align-items:center;flex-wrap:wrap;min-width:0;background:var(--bgi);border:1px solid var(--bd);border-radius:8px;padding:3px 8px;gap:4px;min-height:32px;transition:border-color .15s;position:relative}
.search-bar:focus-within{border-color:var(--t4)}
.search-bar .sbi{color:var(--t4);display:flex;flex-shrink:0}
.search-bar .sbi svg{width:14px;height:14px}
.fb{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:var(--blued);border:1px solid #2563eb44;border-radius:4px;font-size:10px;color:var(--blue);white-space:nowrap;flex-shrink:0;cursor:default;transition:all .15s}
.fb .fbx{background:none;border:none;color:var(--blue);font-size:10px;opacity:.6;padding:0 0 0 2px;cursor:pointer;display:flex;align-items:center}
.fb .fbx:hover{opacity:1}.fb.off{background:var(--bgsf);border-color:var(--bd);color:var(--t4)}.fb.off .fbx{color:var(--t4)}
.mana{display:inline-flex;width:15px;height:15px;border-radius:50%;font-size:8px;font-weight:700;align-items:center;justify-content:center;border:1px solid #0002;flex-shrink:0}
.mana.sm{width:13px;height:13px;font-size:7px}
.st{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:var(--bgsf);border:1px solid var(--bd);border-radius:4px;font-size:10px;color:var(--t2);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s}
.st:hover{border-color:var(--red);color:var(--red)}
.st .stl{color:var(--t4);font-size:9px;text-transform:uppercase;letter-spacing:.3px}
.st .stx{font-size:9px;opacity:0;transition:opacity .15s;margin-left:1px}
.st:hover .stx{opacity:1}
.search-bar input{flex:1;min-width:80px;background:none;border:none;color:var(--t1);font-size:12px;outline:none;padding:2px 0}
.search-bar input::placeholder{color:var(--t4)}
.search-bar .sbc{background:none;border:none;color:var(--t4);display:none;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;transition:all .15s;flex-shrink:0;padding:0}
.search-bar .sbc:hover{color:var(--t2);background:var(--bgh)}.search-bar .sbc.vis{display:flex}

/* AUTOCOMPLETE */
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1a1a;border:1px solid var(--bdl);border-radius:8px;box-shadow:0 8px 32px #0008;overflow:hidden;z-index:50;display:none}
.ac-drop.show{display:block}
.ac-lbl{padding:5px 10px 3px;font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px}
.ac-item{padding:6px 10px;font-size:12px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .1s}
.ac-item:hover{background:var(--bgh);color:var(--t1)}
.ac-item .acm{margin-left:auto;display:flex;gap:2px}
.ac-parsed{padding:7px 10px;border-top:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.ac-pl{font-size:9px;color:var(--t4);margin-right:4px}

/* CARD GRID */
.cgrid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;align-content:start}
.ct{position:relative;border-radius:11px;overflow:hidden;aspect-ratio:488/680;cursor:pointer;transition:transform .15s,box-shadow .15s}
.ct:hover{transform:translateY(-3px);box-shadow:0 8px 24px #0006}
.ct svg.cart{width:100%;height:100%;display:block}
.ct .idb{position:absolute;top:6px;left:6px;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--bg);z-index:5}
.ct .qb{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#000b;backdrop-filter:blur(4px);padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;z-index:5;pointer-events:none}
.ct .cov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,#000b 25%,#000d);padding:28px 10px 10px;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;gap:5px;z-index:4}
.ct:hover .cov{transform:translateY(0)}
.ov-n{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-m{font-size:10px;color:#aaa;display:flex;align-items:center;gap:6px}
.ov-a{display:flex;align-items:center;gap:6px;margin-top:2px}
.ov-add{flex:1;padding:6px;border-radius:6px;background:var(--blue);color:#fff;border:none;font-size:11px;font-weight:600;transition:background .15s}
.ov-add:hover{background:#2563eb}
.qty-c{display:flex;align-items:center;background:#333;border-radius:6px;overflow:hidden}
.qty-c button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:#fff;font-size:14px;transition:background .1s}
.qty-c button:hover{background:#555}
.qty-c .qn{width:22px;text-align:center;font-size:11px;font-weight:600;color:#fff}

/* MODAL */
.mbg{position:fixed;inset:0;background:#000a;z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mbg.show{display:flex}
.modal{background:var(--bgs);border:1px solid var(--bd);border-radius:12px;width:680px;max-width:94vw;max-height:90vh;overflow:hidden;display:flex;position:relative}
.m-left{width:280px;min-width:280px;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px}
.m-left svg.cart{width:100%;max-width:240px;height:auto;border-radius:8px}
.m-tabs{display:flex;width:100%;border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
.m-tab{flex:1;padding:7px;font-size:11px;font-weight:500;text-align:center;background:var(--bgsf);color:var(--t3);border:none;transition:all .15s}
.m-tab:hover{color:var(--t1)}.m-tab.active{background:var(--blued);color:var(--blue)}
.m-ctx{width:100%;padding:9px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.m-ctx.add{background:var(--blue);color:#fff}.m-ctx.add:hover{background:#2563eb}
.m-ctx.swap{background:var(--bgsf);color:var(--t3);border:1px solid var(--bd)}.m-ctx.swap:hover{color:var(--t1);border-color:var(--t4)}
.m-ctx.disabled{background:var(--bgsf);color:var(--t4);border:1px solid var(--bd);cursor:default;opacity:.5}
.m-ctx.disabled:hover{color:var(--t4);border-color:var(--bd)}
.m-right{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.m-x{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bgsf);border:1px solid var(--bd);color:var(--t3);cursor:pointer;font-size:14px;transition:all .15s;z-index:2}
.m-x:hover{color:var(--t1);border-color:var(--t4)}
.m-name{font-size:18px;font-weight:600}.m-set{font-size:11px;color:var(--t3)}
.m-sec{padding:12px;background:var(--bgsf);border-radius:8px;display:flex;flex-direction:column;gap:6px}
.m-type{font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:space-between}
.m-oracle{font-size:12px;color:var(--t2);line-height:1.6}
.m-flavor{font-size:11px;color:var(--t4);font-style:italic;line-height:1.5;border-top:1px solid var(--bd);padding-top:6px;margin-top:2px}
.m-dets{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:11px}
.m-dets dt{color:var(--t3);font-weight:500}.m-dets dd{color:var(--t2)}
.m-leg{display:flex;flex-wrap:wrap;gap:4px}
.ml{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;letter-spacing:.3px}
.ml.y{background:#052e16;color:var(--green);border:1px solid #14532d}
.ml.n{background:#1c1917;color:var(--t4);border:1px solid var(--bd)}

/* MODE VISIBILITY */
.mode-search .ws-deck{display:none}.mode-search .ws-search{display:flex;flex-direction:column;flex:1;overflow:hidden}
.mode-search .sb-search{display:flex}.mode-search .sb-decks{display:none}
.mode-decks .ws-search{display:none}.mode-decks .ws-deck{display:flex;flex-direction:column;flex:1;overflow:hidden}
.mode-decks .sb-search{display:none}.mode-decks .sb-decks{display:flex}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);padding:8px 18px;background:var(--green);color:#000;font-size:12px;font-weight:600;border-radius:8px;z-index:999;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app mode-decks" id="app">
<aside class="sidebar" id="sidebar">
  <div class="tab-bar">
    <button class="tab-btn" data-tab="search" onclick="setMode('search')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span class="tl">Search</span></button>
    <button class="tab-btn active" data-tab="decks" onclick="setMode('decks')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg><span class="tl">Decks</span></button>
    <button class="col-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
  </div>
  <div class="sb-body">
    <!-- SEARCH SIDEBAR: categories + filters only -->
    <div class="sb-search">
      <div class="sb-sec" style="border-bottom:1px solid var(--bd)">
        <div class="sb-lbl">Categories</div>
        <div class="chips" id="cats"></div>
      </div>
      <div class="filters" style="padding-top:12px">
        <div class="fg"><div class="fg-lbl">Price Range</div>
          <div class="fg-row">
            <input class="fg-in" id="priceMin" value="$0" onfocus="this.select()" onchange="updateRange()">
            <div class="fg-range" onclick="clickRange(event,this)"><div class="fg-fill" id="rf" style="width:100%"></div></div>
            <input class="fg-in" id="priceMax" value="$100" onfocus="this.select()" onchange="updateRange()">
          </div>
        </div>
        <div class="fg"><div class="fg-lbl">Rarity</div><div class="fc">
          <button class="fc-btn on" onclick="this.classList.toggle('on')">Common</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')">Uncommon</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')">Rare</button>
          <button class="fc-btn" onclick="this.classList.toggle('on')">Mythic</button>
        </div></div>
        <div class="fg"><div class="fg-lbl">Card Type</div><div class="fc">
          <button class="fc-btn on" onclick="this.classList.toggle('on')">Creature</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')">Instant</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')">Sorcery</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')">Enchantment</button>
          <button class="fc-btn" onclick="this.classList.toggle('on')">Artifact</button>
          <button class="fc-btn" onclick="this.classList.toggle('on')">Land</button>
          <button class="fc-btn" onclick="this.classList.toggle('on')">Planeswalker</button>
        </div></div>
        <div class="fg"><div class="fg-lbl">Colors</div><div class="fc">
          <button class="fc-btn on" onclick="this.classList.toggle('on')" style="display:flex;align-items:center;gap:3px"><span class="mana sm" style="background:#f9faf4;color:#000">W</span>White</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')" style="display:flex;align-items:center;gap:3px"><span class="mana sm" style="background:#0e68ab;color:#fff">U</span>Blue</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')" style="display:flex;align-items:center;gap:3px"><span class="mana sm" style="background:#150b00;color:#fff">B</span>Black</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')" style="display:flex;align-items:center;gap:3px"><span class="mana sm" style="background:#d3202a;color:#fff">R</span>Red</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')" style="display:flex;align-items:center;gap:3px"><span class="mana sm" style="background:#00733e;color:#fff">G</span>Green</button>
          <button class="fc-btn on" onclick="this.classList.toggle('on')" style="display:flex;align-items:center;gap:3px"><span class="mana sm" style="background:#ccc2c0;color:#000">C</span>Colorless</button>
        </div></div>
      </div>
    </div>
    <!-- DECKS SIDEBAR: unchanged from current app -->
    <div class="sb-decks">
      <div class="dr act"><div class="di"><div class="dn">Rats Deck</div><div class="dm">Freeform · 62 cards</div></div><span class="dc">62</span></div>
      <div class="dr"><div class="di"><div class="dn">Gruul Smash</div><div class="dm">Commander · R/G</div></div><span class="dc">72/100</span></div>
      <div class="dr"><div class="di"><div class="dn">Azorius Control</div><div class="dm">Standard · W/U</div></div><span class="dc">58/60</span></div>
      <div class="dr" style="margin-top:8px;border-top:1px solid var(--bd);padding-top:12px"><div class="di"><div class="dn" style="color:var(--blue)">+ New Deck</div></div></div>
    </div>
  </div>
</aside>

<div class="ws">
  <!-- SEARCH WORKSPACE -->
  <div class="ws-search">
    <div class="tb">
      <div class="tb-row tb-r1">
        <div class="search-bar" id="sbar">
          <span class="sbi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
          <span class="fb" id="fb" onclick="toggleFilter()"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Freeform <button class="fbx" onclick="event.stopPropagation();toggleFilter()">×</button></span>
          <span id="tc"></span>
          <input type="text" id="si" placeholder="Search for cards, types, keywords..." oninput="onS(this.value)" onfocus="showAC()"/>
          <button class="sbc" id="cb" onclick="clearS()"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
          <div class="ac-drop" id="acd"></div>
        </div>
      </div>
      <div class="tb-row tb-r2">
        <span class="tb-stat" id="rc"><b>16</b> results</span>
        <div class="tright">
          <select class="tb-sel"><option>Sort: Relevance</option><option>Name</option><option>Price ↑</option><option>Price ↓</option><option>Mana Value</option><option>Color</option></select>

function rDG(){
  document.getElementById('dg').innerHTML=DECK.map(function(c){
    return'<div class="ct" onclick="oM(\''+c.id+'\',\'deck\')">'+cSVG(c,'sm')+'<span class="qb">×'+c.qty+'</span><div class="cov"><div class="ov-n">'+esc(c.name)+'</div><div class="ov-m"><span>'+(c.price?'$'+c.price:'')+'</span><span>'+c.type.split('—')[0].trim()+'</span></div><div class="ov-a"><div class="qty-c"><button onclick="event.stopPropagation()">−</button><span class="qn">'+c.qty+'</span><button onclick="event.stopPropagation()">+</button></div></div></div></div>';
  }).join('');
}

/* MODAL */
var mCard=null,mCtx='',mTab='details';
function oM(id,ctx){
  var c=DECK.concat(SEARCH).filter(function(x){return x.id===id})[0];if(!c)return;
  mCard=c;mCtx=ctx;mTab='details';
  document.getElementById('mA').innerHTML=cSVG(c,'lg');
  document.getElementById('mN').textContent=c.name;
  document.getElementById('mS').textContent=c.set||'Mystery Booster';
  document.getElementById('mT').innerHTML='<span>'+c.type+'</span><span>'+mCH(c.cost)+'</span>';
  document.getElementById('mO').textContent=c.oracle;
  var fl=document.getElementById('mF');if(c.flavor){fl.style.display='';fl.textContent=c.flavor}else fl.style.display='none';
  document.getElementById('mD').innerHTML='<dl class="m-dets"><dt>Artist</dt><dd style="color:var(--blue)">Various Artists</dd><dt>Rarity</dt><dd>Uncommon</dd><dt>Collector #</dt><dd>'+Math.floor(Math.random()*300+1)+'</dd><dt>Price</dt><dd style="color:var(--amber)">'+(c.price?'$'+c.price:'N/A')+'</dd></dl>';
  document.getElementById('mL').innerHTML=[{f:'Standard',l:Math.random()>.5},{f:'Pioneer',l:Math.random()>.4},{f:'Modern',l:true},{f:'Legacy',l:true},{f:'Vintage',l:true},{f:'Commander',l:true},{f:'Pauper',l:Math.random()>.6}].map(function(x){return'<span class="ml '+(x.l?'y':'n')+'">'+x.f+': '+(x.l?'LEGAL':'NOT LEGAL')+'</span>'}).join('');
  uCB();
  document.querySelectorAll('.m-tab').forEach(function(t,i){t.classList.toggle('active',i===0)});
  document.getElementById('mbg').classList.add('show');
}
function closeModal(){document.getElementById('mbg').classList.remove('show')}
function setMT(tab,btn){mTab=tab;document.querySelectorAll('.m-tab').forEach(function(t){t.classList.remove('active')});btn.classList.add('active');uCB()}
function uCB(){
  var b=document.getElementById('mCB');
  if(mCtx==='search'){
    // Search context: always Add to Deck
    b.className='m-ctx add';b.textContent='+ Add to Deck';b.disabled=false;
  }else{
    // Deck context: Confirm Art Swap (disabled in Details, active in Swap Art)
    if(mTab==='swap'){b.className='m-ctx swap';b.textContent='Confirm Art Swap';b.disabled=false}
    else{b.className='m-ctx disabled';b.textContent='Confirm Art Swap';b.disabled=true}
  }
}
function ctxA(){
  if(document.getElementById('mCB').disabled)return;
  if(mCtx==='search'){addC(mCard.name);closeModal()}
  else if(mTab==='swap'){showT('Art swap confirmed');closeModal()}
}

var mode='decks',fOn=true;
function setMode(m){mode=m;document.getElementById('app').className='app mode-'+m;document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===m)});if(m==='search')setTimeout(function(){document.getElementById('si').focus()},100)}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
function toggleFilter(){fOn=!fOn;document.getElementById('fb').classList.toggle('off',!fOn)}
function addC(n){showT('Added '+n+' to Rats Deck')}
function showT(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function selCat(id){document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active')});document.querySelectorAll('[data-cat="'+id+'"]').forEach(function(c){c.classList.add('active')})}
function clickRange(e,el){var r=el.getBoundingClientRect(),p=Math.max(0,Math.min(100,Math.round((e.clientX-r.left)/r.width*100)));document.getElementById('rf').style.width=p+'%';document.getElementById('priceMax').value='$'+Math.round(p*2)}
function updateRange(){
  var min=parseInt((document.getElementById('priceMin').value||'0').replace(/[^0-9]/g,''))||0;
  var max=parseInt((document.getElementById('priceMax').value||'100').replace(/[^0-9]/g,''))||100;
  if(max<min)max=min;
  document.getElementById('priceMin').value='$'+min;document.getElementById('priceMax').value='$'+max;
  document.getElementById('rf').style.width=Math.min(100,Math.round(max/2))+'%';
}

document.getElementById('cats').innerHTML=CATS.map(function(c){return'<button class="chip" onclick="selCat(\''+c.id+'\')" data-cat="'+c.id+'"><span style="font-size:11px">'+c.i+'</span>'+c.l+'</button>'}).join('');
rSG();rDG();
document.addEventListener('click',function(e){if(!e.target.closest('.search-bar'))document.getElementById('acd').classList.remove('show')});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
</script>
</body>
</html>
